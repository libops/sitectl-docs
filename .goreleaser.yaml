version: 2
before:
  hooks:
    - go mod tidy
builds:
  - binary: sitectl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
      - windows
      - darwin

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^.github"
brews:
  - name: sitectl
    homepage: "https://github.com/libops/sitectl"
    commit_author:
      name: sitectl-dev[bot]
      email: 2408410+sitectl-dev[bot]@users.noreply.github.com
    repository:
      owner: libops
      name: homebrew
nfpms:
  - id: sitectl
    package_name: sitectl
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: libops
    homepage: "https://github.com/libops/sitectl"
    description: "CLI for managing local and remote Docker Compose projects"
    maintainer: "Joe Corall <joe@libops.io>"
    license: "MIT"
    formats:
      - apk
      - deb
      - rpm
    mtime: "{{ .CommitDate }}"
    builds:
      - sitectl
